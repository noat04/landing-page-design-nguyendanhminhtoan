<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" as="image" href="/iphone.webp" type="image/webp" fetchpriority="high" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030405" />
    <meta
      name="description"
      content="iPhone 18 Pro concept landing page with a premium product banner, feature preview video, scrollytelling sections, technical specifications, dark mode, and webhook-ready newsletter signup."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="iPhone 18 Pro - Pro. Beyond." />
    <meta
      property="og:description"
      content="Explore an iPhone 18 Pro concept landing page built with React and GSAP, featuring product highlights, specs, and a video preview."
    />
    <meta property="og:image" content="/Landing%20page%20%20iPhone%2015pro%20(Community).png" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="iPhone 18 Pro - Pro. Beyond." />
    <meta
      name="twitter:description"
      content="A modern, responsive scrollytelling landing page with an iPhone 18 Pro concept banner and product video."
    />
    <style>
      @font-face {
        font-family: 'Techgear Sans';
        src: url('/fonts/regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Techgear Sans';
        src: url('/fonts/medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Techgear Sans';
        src: url('/fonts/semibold.woff2') format('woff2');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg: #030405;
        --bg-soft: #080a0c;
        --panel: rgba(255, 255, 255, 0.055);
        --text: #f7f5f4;
        --muted: #b7b1b3;
        --line: rgba(255, 255, 255, 0.14);
        --accent: #c94762;
        --accent-2: #f0a1ae;
        --accent-dark: #7f1f34;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        color-scheme: dark;
      }

      :root[data-theme='light'] {
        --bg: #f7f4f1;
        --bg-soft: #ffffff;
        --text: #151416;
        --muted: #535057;
        --line: rgba(20, 23, 28, 0.13);
        --accent: #b73351;
        --accent-2: #76395a;
        --accent-dark: #f5dbe1;
        --shadow: 0 24px 80px rgba(84, 67, 73, 0.18);
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        overflow-x: hidden;
        background: #030405;
        color: #f7f5f4;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input {
        font: inherit;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      img,
      canvas,
      svg,
      video {
        max-width: 100%;
      }

      .app-shell {
        min-height: 100vh;
        background:
          radial-gradient(circle at 73% 8%, rgba(201, 71, 98, 0.24), transparent 28rem),
          radial-gradient(circle at 12% 42%, rgba(114, 214, 154, 0.09), transparent 28rem),
          linear-gradient(180deg, var(--bg), var(--bg-soft) 48%, var(--bg));
        color: var(--text);
        font-family:
          'Techgear Sans', Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .site-header {
        position: fixed;
        z-index: 20;
        top: 14px;
        left: 50%;
        width: min(1120px, calc(100% - 28px));
        min-height: 62px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(4, 5, 7, 0.72);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      :root[data-theme='light'] .site-header {
        background: rgba(255, 255, 255, 0.78);
      }

      .brand,
      .desktop-nav,
      .header-actions,
      .hero-actions {
        display: flex;
        align-items: center;
      }

      .brand {
        gap: 10px;
        color: var(--text);
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), #17191f 68%);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .desktop-nav {
        justify-content: center;
        gap: clamp(18px, 3vw, 38px);
      }

      .desktop-nav a {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
      }

      .header-actions,
      .hero-actions {
        gap: 10px;
      }

      .primary-button,
      .ghost-button,
      .icon-button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 7px;
        cursor: pointer;
      }

      .primary-button,
      .ghost-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.94rem;
        font-weight: 600;
        text-decoration: none;
      }

      .primary-button {
        min-width: 152px;
        padding: 0 22px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #fff;
        box-shadow: 0 12px 30px rgba(201, 71, 98, 0.28);
      }

      .primary-button.small {
        min-width: 96px;
        min-height: 40px;
      }

      .ghost-button {
        min-width: 112px;
        padding: 0 18px;
        background: rgba(255, 255, 255, 0.025);
        color: var(--text);
      }

      .icon-button {
        width: 44px;
        padding: 0;
        background: var(--panel);
        color: var(--text);
        font-size: 0.62rem;
        font-weight: 700;
      }

      .hero-section {
        position: relative;
        width: min(1120px, calc(100% - 48px));
        min-height: 100vh;
        margin-inline: auto;
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(0, 1.18fr);
        align-items: center;
        gap: 30px;
        padding: 118px 0 48px;
        overflow: hidden;
      }

      .hero-copy {
        position: relative;
        z-index: 3;
        max-width: 520px;
      }

      .eyebrow {
        width: max-content;
        margin: 0 0 18px;
        padding: 6px 11px;
        border: 1px solid rgba(201, 71, 98, 0.38);
        border-radius: 7px;
        background: rgba(201, 71, 98, 0.1);
        color: var(--accent-2);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        overflow-wrap: anywhere;
      }

      h1 {
        max-width: 560px;
        margin: 0;
        font-size: clamp(3.35rem, 5.25vw, 5.45rem);
        font-weight: 500;
        line-height: 1.03;
      }

      h1 span {
        display: block;
        margin-top: 6px;
        color: var(--accent-2);
        font-weight: 500;
      }

      .hero-title {
        max-width: 560px;
        font-size: clamp(3rem, 4.45vw, 4.8rem);
        line-height: 1.02;
      }

      .hero-title span {
        font-size: clamp(2.35rem, 3.35vw, 3.62rem);
        line-height: 1.06;
      }

      .hero-text {
        max-width: 390px;
        margin: 24px 0 28px;
        color: var(--muted);
        font-size: clamp(0.94rem, 1vw, 1.02rem);
        line-height: 1.5;
      }

      .film-button {
        gap: 10px;
      }

      .film-button span {
        display: grid;
        min-width: 22px;
        height: 22px;
        place-items: center;
        border-radius: 999px;
        background: rgba(201, 71, 98, 0.14);
        color: var(--accent-2);
        font-size: 0.72rem;
      }

      .colors {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 38px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .colors i {
        width: 20px;
        height: 20px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 999px;
      }

      .rose {
        background: #8c2638;
      }

      .deep-purple {
        background: #523359;
      }

      .desert-gold {
        background: #C9845D;
      }

      .hero-visual {
        position: relative;
        z-index: 2;
        width: min(100%, 620px);
        aspect-ratio: 670 / 377;
        justify-self: end;
      }

      .hero-banner-wrap,
      .hero-banner-picture,
      .hero-banner {
        width: 100%;
        height: 100%;
      }

      .hero-banner-wrap {
        display: grid;
        place-items: center;
      }

      .hero-banner {
        object-fit: contain;
        object-position: center;
      }

      .hero-glow {
        position: absolute;
        right: 3%;
        bottom: 7%;
        width: 54%;
        height: 28%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201, 71, 98, 0.16), transparent 68%);
        filter: blur(38px);
        pointer-events: none;
      }

      .lazy-section-placeholder {
        width: min(1120px, calc(100% - 48px));
        margin-inline: auto;
      }

      .toast {
        position: fixed;
        z-index: 30;
        right: 18px;
        bottom: 18px;
        display: flex;
        max-width: min(360px, calc(100% - 36px));
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(4, 5, 7, 0.78);
        color: var(--text);
        font-size: 0.9rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      :root[data-theme='light'] .toast {
        background: rgba(255, 255, 255, 0.82);
      }

      .toast span {
        width: 9px;
        height: 9px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: #72d69a;
        box-shadow: 0 0 18px #72d69a;
      }

      @media (max-width: 1040px) {
        .desktop-nav {
          display: none;
        }

        .hero-section {
          grid-template-columns: 1fr;
          min-height: auto;
          padding: 112px 0 44px;
          gap: 26px;
        }

        .hero-copy {
          max-width: 620px;
        }

        .hero-visual {
          width: min(100%, 720px);
          justify-self: center;
        }
      }

      @media (max-width: 720px) {
        .site-header {
          top: 10px;
          width: calc(100% - 20px);
        }

        .brand span:last-child,
        .ghost-button {
          display: none;
        }

        .hero-section {
          width: calc(100% - 28px);
          padding: 98px 0 40px;
          gap: 16px;
        }

        h1,
        .hero-title {
          font-size: clamp(2.55rem, 10.8vw, 3.85rem);
          line-height: 1;
        }

        .hero-title span {
          font-size: clamp(2.05rem, 8.8vw, 3rem);
        }

        .hero-text {
          margin: 18px 0;
          font-size: 0.98rem;
          line-height: 1.55;
        }

        .hero-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .primary-button,
        .hero-visual {
          width: 100%;
        }

        .toast {
          right: 10px;
          bottom: 10px;
          font-size: 0.82rem;
        }
      }
    </style>
    <title>iPhone 18 Pro - Pro. Beyond.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
